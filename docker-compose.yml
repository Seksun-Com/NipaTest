services:
  mysql_db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ticket_system_db
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./tickets.sql:/docker-entrypoint-initdb.d/db_setup.sql

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql_db
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: ticket_system_db
    depends_on:
      - mysql_db

  frontend:
    build: ./frontend/tickets
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend
  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=mysql_db
      - PMA_USER=root
      - PMA_PASSWORD=rootpassword
    depends_on:
      - mysql_db
      
volumes:
  mysql_data:
